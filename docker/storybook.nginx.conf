server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compress text assets on the fly.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        image/svg+xml
        font/woff2;

    # Content-hashed build assets can be cached aggressively.
    location ~* \.(?:js|mjs|css|woff2?|ttf|eot|svg|png|jpe?g|gif|ico|map)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback for the Storybook manager; real files (iframe.html, json
    # metadata) are served directly when they exist.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
